// ─── Badge components ─────────────────────────────────────────────────────────
function RiskBadge({ level }) {
  const map = {
    Critical: { cls: 'bg-red-50 text-red-700 border-red-200', dot: 'bg-red-500', pulse: true },
    High:     { cls: 'bg-orange-50 text-orange-700 border-orange-200', dot: 'bg-orange-500' },
    Medium:   { cls: 'bg-amber-50 text-amber-700 border-amber-200', dot: 'bg-amber-400' },
    Low:      { cls: 'bg-emerald-50 text-emerald-700 border-emerald-200', dot: 'bg-emerald-500' },
  };
  const { cls, dot, pulse } = map[level] || map.Low;
  return (
    <span className={`badge ${cls}`}>
      <span className={`w-1.5 h-1.5 rounded-full inline-block ${dot}${pulse ? ' live-dot' : ''}`} />
      {level}
    </span>
  );
}

function StatusBadge({ status }) {
  const map = {
    'On Track': { cls: 'bg-emerald-50 text-emerald-700 border-emerald-200', icon: <CheckCircle2Icon size={12}/> },
    'At Risk':  { cls: 'bg-orange-50 text-orange-700 border-orange-200',   icon: <AlertTriangleIcon size={12}/> },
    'Delayed':  { cls: 'bg-red-50 text-red-700 border-red-200',            icon: <XCircleIcon size={12}/> },
  };
  const { cls, icon } = map[status] || map['On Track'];
  return <span className={`badge ${cls}`}>{icon}{status}</span>;
}

function CategoryBadge({ category }) {
  const map = {
    'Bug':                      { cls: 'bg-red-50 text-red-600 border-red-200',       icon: <BugIcon size={11}/>,    label: 'Bug' },
    'Top Customer Feature Ask': { cls: 'bg-blue-50 text-blue-700 border-blue-200',    icon: <StarIcon size={11}/>,   label: 'Customer Feature' },
    'KTLO':                     { cls: 'bg-violet-50 text-violet-700 border-violet-200', icon: <WrenchIcon size={11}/>, label: 'KTLO' },
  };
  const { cls, icon, label } = map[category] || {};
  return <span className={`badge ${cls}`}>{icon}{label}</span>;
}

function TeamChip({ team }) {
  const map = {
    Hardware: 'bg-cyan-50 text-cyan-700 border-cyan-200',
    Software: 'bg-indigo-50 text-indigo-700 border-indigo-200',
    Quality:  'bg-purple-50 text-purple-700 border-purple-200',
  };
  return <span className={`team-chip ${map[team] || ''}`}>{team}</span>;
}

function ProgressBar({ value }) {
  const color = value === 100 ? 'bg-emerald-500' : value >= 70 ? 'bg-indigo-500' : value >= 40 ? 'bg-amber-400' : 'bg-red-400';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:'8px', minWidth:'100px' }}>
      <div style={{ flex:1, height:'6px', borderRadius:'9999px', background:'#f1f5f9', overflow:'hidden' }}>
        <div className={color} style={{ height:'100%', width:`${value}%`, borderRadius:'9999px', transition:'width 500ms' }} />
      </div>
      <span style={{ fontSize:'11px', fontFamily:'JetBrains Mono,monospace', color:'#64748b', width:'28px', textAlign:'right' }}>{value}%</span>
    </div>
  );
}

function TicketStatusPill({ status }) {
  const map = {
    'Done':        'background:#d1fae5;color:#065f46',
    'In Progress': 'background:#dbeafe;color:#1e40af',
    'To Do':       'background:#f1f5f9;color:#475569',
    'Blocked':     'background:#fee2e2;color:#991b1b',
  };
  return (
    <span style={{ fontSize:'10px', fontWeight:600, padding:'2px 8px', borderRadius:'9999px', display:'inline-block', ...Object.fromEntries((map[status]||'').split(';').map(s=>s.split(':').map(p=>p.trim())).filter(p=>p.length===2)) }}>
      {status}
    </span>
  );
}

function TicketTypePill({ type }) {
  const map = {
    Story: { bg:'#f0fdf4', color:'#15803d', border:'#bbf7d0' },
    Bug:   { bg:'#fef2f2', color:'#dc2626', border:'#fecaca' },
    Task:  { bg:'#f8fafc', color:'#475569', border:'#e2e8f0' },
  };
  const s = map[type] || map.Task;
  return (
    <span style={{ fontSize:'10px', fontWeight:500, padding:'2px 6px', borderRadius:'4px', border:`1px solid ${s.border}`, background:s.bg, color:s.color, display:'inline-block' }}>
      {type}
    </span>
  );
}

          </table>
        </div>

        {/* Legend */}
        <div style={{ display:'flex', alignItems:'center', gap:'24px', fontSize:'12px', color:'#64748b', paddingBottom:'24px' }}>
          {[['#ef4444','Critical — immediate escalation',true],['#f97316','High — close monitoring'],['#f59e0b','Medium — plan mitigation'],['#22c55e','Low — on track']].map(([c, label, pulse]) => (
            <div key={label} style={{ display:'flex', alignItems:'center', gap:'6px' }}>

              {label}
            </div>
          ))}
          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:'4px', color:'#4f46e5', fontWeight:500 }}>
            <UsersIcon size={12} /> Team links navigate to Sprint Metrics
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Custom Recharts Tooltip ──────────────────────────────────────────────────
function VelocityTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  const plan = payload.find(p => p.name === 'Planned')?.value || 0;
  const done = payload.find(p => p.name === 'Completed')?.value || 0;
  const vel = plan > 0 ? Math.round((done / plan) * 100) : 0;
  const velColor = vel >= 80 ? '#16a34a' : vel >= 60 ? '#d97706' : '#dc2626';
  return (
    <div style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:'10px', padding:'10px 14px', fontSize:'11px', boxShadow:'0 4px 12px rgba(0,0,0,0.1)', minWidth:'140px' }}>
      <p style={{ fontWeight:600, color:'#334155', marginBottom:'8px', paddingBottom:'6px', borderBottom:'1px solid #f1f5f9' }}>{label}</p>
      {payload.map(p => (
        <div key={p.name} style={{ display:'flex', justifyContent:'space-between', gap:'16px', padding:'2px 0' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
            <span style={{ width:'8px', height:'8px', borderRadius:'2px', background:p.color, display:'inline-block' }} />
            <span style={{ color:'#64748b' }}>{p.name}</span>
          </div>
          <span style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:'#1e293b' }}>{p.value} pts</span>
        </div>
      ))}
      <div style={{ borderTop:'1px solid #f1f5f9', marginTop:'6px', paddingTop:'6px', display:'flex', justifyContent:'space-between' }}>
        <span style={{ color:'#64748b' }}>Velocity</span>
        <span style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:velColor }}>{vel}%</span>
      </div>
    </div>
  );
}

                        <div style={{ marginBottom:'4px' }}>
                          <div style={{ height:'6px', borderRadius:'9999px', background:'#f1f5f9', overflow:'hidden' }}>
                            <div style={{ height:'100%', borderRadius:'9999px', background:vColor, width:`${Math.min(100,v)}%` }} />
                          </div>
                        </div>
                        <span style={{ fontSize:'12px', fontWeight:700, color:vColor, fontVariantNumeric:'tabular-nums' }}>{v}%</span>
                      </td>
                      <td><span style={{ fontSize:'12px', fontWeight:600, color: sprint.bugsFound>5?'#dc2626':sprint.bugsFound>2?'#f97316':'#475569' }}>{sprint.bugsFound}</span></td>
                      <td><span style={{ fontSize:'12px', fontWeight:600, color: sprint.blockedCount>3?'#dc2626':sprint.blockedCount>0?'#f97316':'#94a3b8' }}>{sprint.blockedCount}</span></td>
                      <td>
                        {sprint.status==='Completed' ? <CheckCircle2Icon size={16} cls="text-emerald-500" /> :
                         sprint.status==='Active'    ? <div className="spinner" /> :
                                                       <ClockIcon size={16} cls="text-slate-300" />}
                      </td>
                    </tr>
                    {sel && (
                      <tr>
                        <td colSpan={9} style={{ padding:0 }}>
                          <div style={{ margin:'0 16px 12px', borderRadius:'10px', border:'1px solid #e2e8f0', overflow:'hidden' }}>
                            <div style={{ padding:'8px 16px', background:'#f8fafc', borderBottom:'1px solid #e2e8f0', display:'flex', alignItems:'center', gap:'8px' }}>
                              <span style={{ fontSize:'11px', fontWeight:600, color:'#475569' }}>Sprint Tickets — {sprint.name}</span>
                              <span style={{ fontSize:'10px', color:'#94a3b8' }}>({sprint.tickets.length} tickets)</span>
                            </div>
                            {sprint.tickets.length > 0 ? (
                              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                                <thead>
                                  <tr style={{ background:'#f8fafc' }}>
                                    {['ID','Title','Type','Pts','Assignee','Status'].map(h => (
                                      <th key={h} style={{ fontSize:'10px', fontWeight:600, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.05em', padding:'8px 16px', textAlign:'left', borderBottom:'1px solid #e2e8f0' }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {sprint.tickets.map(t => (
                                    <tr key={t.id} className="ticket-row" style={{ borderBottom:'1px solid #f1f5f9' }}>
                                      <td style={{ padding:'8px 16px', fontSize:'10px', fontFamily:'JetBrains Mono,monospace', color:'#94a3b8' }}>{t.id}</td>
                                      <td style={{ padding:'8px 16px', fontSize:'11px', color:'#334155' }}>{t.title}</td>
                                      <td style={{ padding:'8px 16px' }}><TicketTypePill type={t.type} /></td>
                                      <td style={{ padding:'8px 16px', fontSize:'11px', fontWeight:600, fontFamily:'JetBrains Mono,monospace', color:'#334155' }}>{t.storyPoints}</td>
                                      <td style={{ padding:'8px 16px', fontSize:'11px', color:'#475569' }}>{t.assignee}</td>
                                      <td style={{ padding:'8px 16px' }}><TicketStatusPill status={t.status} /></td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            ) : (
                              <div style={{ padding:'20px', textAlign:'center', fontSize:'12px', color:'#94a3b8' }}>
                                No ticket data available for this sprint in the standalone demo.<br/>
                                <span style={{ fontSize:'11px' }}>Ticket data is loaded for the 3 most recent sprints (11–13) per team.</span>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── App + Router ─────────────────────────────────────────────────────────────
function App() {
  return (
    <HashRouter>
      <Routes>
        <Route path="/" element={<Layout />}>
          <Route index element={<FeatureReleasePage />} />
          <Route path="sprints" element={<SprintMetricsPage />} />
          <Route path="*" element={<Navigate to="/" replace />} />
        </Route>
      </Routes>
    </HashRouter>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
