// ─── Shared small components ──────────────────────────────────────────────────
function RiskBadge({ level }) {
  const cfg = {
    Critical: { bg:'#fef2f2', color:'#b91c1c', border:'#fecaca', dot:'#ef4444', pulse:true },
    High:     { bg:'#fff7ed', color:'#c2410c', border:'#fed7aa', dot:'#f97316' },
    Medium:   { bg:'#fffbeb', color:'#92400e', border:'#fde68a', dot:'#f59e0b' },
    Low:      { bg:'#f0fdf4', color:'#15803d', border:'#bbf7d0', dot:'#22c55e' },
  }[level] || {};
  return (
    <span className="badge" style={{ background:cfg.bg, color:cfg.color, borderColor:cfg.border }}>
      <span className={cfg.pulse ? 'live-dot' : ''} style={{ width:6,height:6,borderRadius:'50%',background:cfg.dot,display:'inline-block',flexShrink:0 }} />
      {level}
    </span>
  );
}

function StatusBadge({ status }) {
  const cfg = {
    'On Track': { bg:'#f0fdf4', color:'#15803d', border:'#bbf7d0', icon:<CheckIco size={12}/> },
    'At Risk':  { bg:'#fff7ed', color:'#c2410c', border:'#fed7aa', icon:<WarnIco size={12}/> },
    'Delayed':  { bg:'#fef2f2', color:'#b91c1c', border:'#fecaca', icon:<XCircIco size={12}/> },
  }[status] || {};
  return (
    <span className="badge" style={{ background:cfg.bg, color:cfg.color, borderColor:cfg.border }}>
      {cfg.icon}{status}
    </span>
  );
}

function CatBadge({ cat }) {
  const cfg = {
    'Bug':                      { bg:'#fef2f2', color:'#dc2626', border:'#fecaca', icon:<BugIco size={11}/>,    label:'Bug' },
    'Top Customer Feature Ask': { bg:'#eff6ff', color:'#1d4ed8', border:'#bfdbfe', icon:<StarIco size={11}/>,   label:'Customer Feature' },
    'KTLO':                     { bg:'#f5f3ff', color:'#6d28d9', border:'#ddd6fe', icon:<WrenchIco size={11}/>, label:'KTLO' },
  }[cat] || {};
  return (
    <span className="badge" style={{ background:cfg.bg, color:cfg.color, borderColor:cfg.border }}>
      {cfg.icon}{cfg.label}
    </span>
  );
}

function TeamChip({ team }) {
  const s = {
    Hardware: { bg:'#ecfeff', color:'#0e7490', border:'#a5f3fc' },
    Software: { bg:'#eef2ff', color:'#4338ca', border:'#c7d2fe' },
    Quality:  { bg:'#f5f3ff', color:'#7c3aed', border:'#ddd6fe' },
  }[team] || {};
  return <span className="team-chip" style={{ background:s.bg, color:s.color, borderColor:s.border }}>{team}</span>;
}

function ProgressBar({ value }) {
  const fill = value===100?'#22c55e':value>=70?'#6366f1':value>=40?'#f59e0b':'#ef4444';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:100 }}>
      <div style={{ flex:1, height:6, borderRadius:9999, background:'#f1f5f9', overflow:'hidden' }}>
        <div style={{ height:'100%', borderRadius:9999, background:fill, width:`${value}%`, transition:'width 500ms' }} />
      </div>
      <span style={{ fontSize:11, fontFamily:'JetBrains Mono,monospace', color:'#64748b', width:28, textAlign:'right' }}>{value}%</span>
    </div>
  );
}

function StatusPill({ status }) {
  const s = {
    'Done':        '#d1fae5:#065f46',
    'In Progress': '#dbeafe:#1e40af',
    'To Do':       '#f1f5f9:#475569',
    'Blocked':     '#fee2e2:#991b1b',
  }[status] || '#f1f5f9:#475569';
  const [bg, color] = s.split(':');
  return <span style={{ fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:9999,background:bg,color,display:'inline-block' }}>{status}</span>;
}

function TypePill({ type }) {
  const s = { Story:['#f0fdf4','#15803d','#bbf7d0'], Bug:['#fef2f2','#dc2626','#fecaca'], Task:['#f8fafc','#475569','#e2e8f0'] }[type] || ['#f8fafc','#475569','#e2e8f0'];
  return <span style={{ fontSize:10,fontWeight:500,padding:'2px 6px',borderRadius:4,background:s[0],color:s[1],border:`1px solid ${s[2]}`,display:'inline-block' }}>{type}</span>;
}

                                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                                  <WarnIco size={13}/><span style={{ fontSize:11, fontWeight:600, color:'#334155' }}>Risk Analysis</span>
                                </div>

                                {r.atRiskTeam && (
                                  <button onClick={() => navigate('sprints', r.atRiskTeam)} style={{ marginTop:12, width:'100%', padding:'8px 0', borderRadius:8, background:'#4f46e5', color:'white', fontSize:12, fontWeight:600, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>

                                  </button>
                                )}
                              </div>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Legend */}
        <div style={{ display:'flex', alignItems:'center', gap:20, fontSize:12, color:'#64748b', paddingBottom:24, flexWrap:'wrap' }}>
          {[['#ef4444','Critical — immediate escalation',true],['#f97316','High — close monitoring'],['#f59e0b','Medium — plan mitigation'],['#22c55e','Low — on track']].map(([c,l,p])=>(
            <div key={l} style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span className={p?'live-dot':''} style={{ width:8,height:8,borderRadius:'50%',background:c,display:'inline-block' }}/>
              {l}
            </div>
          ))}
          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:4, color:'#4f46e5', fontWeight:500 }}>
            <UsersIco size={12}/>Team links navigate to Sprint Metrics
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Velocity chart tooltip ───────────────────────────────────────────────────
function VelTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  const plan = (payload.find(p=>p.name==='Planned')||{}).value||0;
  const done = (payload.find(p=>p.name==='Completed')||{}).value||0;
  const vel  = plan>0 ? Math.round(done/plan*100) : 0;
  const vc   = vel>=80?'#16a34a':vel>=60?'#d97706':'#dc2626';
  return (
    <div style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:10, padding:'10px 14px', fontSize:11, boxShadow:'0 4px 12px rgba(0,0,0,0.1)', minWidth:140 }}>
      <p style={{ margin:'0 0 8px', fontWeight:600, color:'#334155', paddingBottom:6, borderBottom:'1px solid #f1f5f9' }}>{label}</p>
      {payload.map(p=>(
        <div key={p.name} style={{ display:'flex', justifyContent:'space-between', gap:16, padding:'2px 0' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ width:8,height:8,borderRadius:2,background:p.color,display:'inline-block' }}/>
            <span style={{ color:'#64748b' }}>{p.name}</span>
          </div>
          <span style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:'#1e293b' }}>{p.value} pts</span>
        </div>
      ))}
      <div style={{ borderTop:'1px solid #f1f5f9', marginTop:6, paddingTop:6, display:'flex', justifyContent:'space-between' }}>
        <span style={{ color:'#64748b' }}>Velocity</span>
        <span style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:vc }}>{vel}%</span>
      </div>
    </div>
  );
}

                                    <tr key={t.id} style={{ borderBottom:'1px solid #f1f5f9' }}>
                                      <td style={{ padding:'8px 16px', fontSize:10, fontFamily:'JetBrains Mono,monospace', color:'#94a3b8' }}>{t.id}</td>
                                      <td style={{ padding:'8px 16px', fontSize:11, color:'#334155' }}>{t.title}</td>
                                      <td style={{ padding:'8px 16px' }}><TypePill type={t.type}/></td>
                                      <td style={{ padding:'8px 16px', fontSize:11, fontWeight:600, fontFamily:'JetBrains Mono,monospace', color:'#334155' }}>{t.storyPoints}</td>
                                      <td style={{ padding:'8px 16px', fontSize:11, color:'#475569' }}>{t.assignee}</td>
                                      <td style={{ padding:'8px 16px' }}><StatusPill status={t.status}/></td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            ) : (
                              <div style={{ padding:'20px 16px', fontSize:12, color:'#94a3b8', textAlign:'center' }}>
                                Ticket detail available for Sprints 11–13. Select a recent sprint to view tickets.
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── App root (no external router — pure React state navigation) ───────────────
function App() {
  const [page, setPage] = useState('releases');
  const [sprintTeam, setSprintTeam] = useState(null);

  const navigate = useCallback((target, team = null) => {
    if (target === 'releases' || target === '/') {
      setPage('releases');
    } else {
      setPage('sprints');
      if (team) setSprintTeam(team);
    }
  }, []);

  return (
    <NavCtx.Provider value={{ page, sprintTeam, navigate }}>
      <div style={{ display:'flex', minHeight:'100vh', background:'#f8fafc' }}>
        <Sidebar/>
        <main style={{ flex:1, overflow:'auto' }}>
          {page === 'releases' ? <FeatureReleasePage/> : <SprintMetricsPage/>}
        </main>
      </div>
    </NavCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
